name: Reconcile release evidence

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact candidate commit SHA shared by every gate
        required: true
        type: string
      ci_run_id:
        description: CI run containing Windows, Linux, and 10k evidence
        required: true
        type: string
      nightly_run_id:
        description: Manually dispatched 100k audit run
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  PEAS_CANDIDATE_SHA: ${{ inputs.candidate_sha }}

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    steps:
      - name: Reject a reconciliation run from a different ref
        if: ${{ github.sha != inputs.candidate_sha }}
        run: |
          echo "::error::Dispatch ref ${{ github.sha }} does not match candidate ${{ inputs.candidate_sha }}"
          exit 1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.PEAS_CANDIDATE_SHA }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm install --global npm@12.0.0 --no-fund --no-audit
      - run: npm run verify:runtime
      - run: npm run verify:candidate
      - name: Download Windows and Linux check evidence
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.ci_run_id }}
          pattern: peas-check-*-${{ env.PEAS_CANDIDATE_SHA }}
          path: audit-input/checks
      - name: Download 10k scale evidence
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.ci_run_id }}
          pattern: peas-scale-metrics-10k-${{ env.PEAS_CANDIDATE_SHA }}
          path: audit-input/scale-10k
      - name: Download 100k scale evidence
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.nightly_run_id }}
          pattern: peas-scale-metrics-100k-${{ env.PEAS_CANDIDATE_SHA }}
          path: audit-input/scale-100k
      - name: Reconcile all required gates
        run: npm run reconcile:evidence -- audit-input
        env:
          PEAS_RELEASE_MANIFEST_PATH: release-manifest-${{ env.PEAS_CANDIDATE_SHA }}.json
          PEAS_EXPECTED_REPOSITORY: ${{ github.repository }}
          PEAS_EXPECTED_CI_RUN_ID: ${{ inputs.ci_run_id }}
          PEAS_EXPECTED_100K_RUN_ID: ${{ inputs.nightly_run_id }}
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: peas-release-manifest-${{ env.PEAS_CANDIDATE_SHA }}
          path: release-manifest-${{ env.PEAS_CANDIDATE_SHA }}.json
          if-no-files-found: error
          retention-days: 90
